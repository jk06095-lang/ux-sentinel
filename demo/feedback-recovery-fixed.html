<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback Recovery Fixed Demo</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    main { min-height: 100vh; padding: 44px; display: grid; gap: 22px; align-content: start; }
    h1 { margin: 0; font-size: 30px; }
    section, .dialog { max-width: 720px; border: 1px solid #cbd5e1; background: #ffffff; padding: 22px; }
    p { color: #475569; line-height: 1.55; }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
    .status { border-color: #047857; background: #ecfdf5; color: #065f46; }
    .dialog { border-color: #64748b; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14); }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <main>
    <h1>Feedback recovery audit</h1>
    <section aria-label="Empty queue">
      <h2>Nothing here</h2>
      <p>The approval queue is empty. Start a review or open help to decide what to do next.</p>
      <div class="actions">
        <button>Start review</button>
        <button>Help</button>
      </div>
    </section>
    <section class="status" role="status" aria-live="polite" data-ux-role="status">
      <h2>Loading completed</h2>
      <p>Approval data finished loading. Retry is available if the data looks stale.</p>
      <button>Retry</button>
    </section>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="session-dialog-title">
      <h2 id="session-dialog-title">Session recovery</h2>
      <p>The workspace can be reopened or dismissed safely.</p>
      <div class="actions">
        <button>Close</button>
        <button>Retry</button>
      </div>
    </div>
  </main>
</body>
</html>
