<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UX Sentinel High-Priority Broken Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #16201d;
        background: #eef4f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        min-height: 100vh;
        padding: 48px;
        background:
          linear-gradient(90deg, rgba(22, 32, 29, 0.06) 1px, transparent 1px),
          linear-gradient(180deg, rgba(22, 32, 29, 0.06) 1px, transparent 1px),
          #eef4f2;
        background-size: 40px 40px;
      }

      .workspace {
        max-width: 920px;
        display: grid;
        gap: 22px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.3;
      }

      p {
        max-width: 680px;
        margin: 0;
        color: #52625c;
        font-size: 16px;
        line-height: 1.55;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 20px;
        padding-top: 12px;
      }

      .primary {
        min-width: 204px;
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        padding: 0 20px;
        background: #17594a;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .tiny {
        width: 24px;
        height: 24px;
        border: 1px solid #99aaa4;
        border-radius: 4px;
        background: #fff;
        color: #16201d;
        font: inherit;
        cursor: pointer;
      }

      .fake-action {
        width: 188px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        border: 1px dashed #476760;
        background: #fff;
        color: #17594a;
        font-weight: 700;
        cursor: pointer;
      }

      .danger-zone {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .danger-zone button {
        width: max-content;
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #9f1d2f;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="workspace" aria-label="Project setup workspace">
        <h1>Project setup</h1>
        <p>
          This screen intentionally contains several perception mismatches for the
          high-priority detector demo. The controls exist, but the evidence should show why
          they are confusing or unsafe.
        </p>
        <div class="toolbar" aria-label="Primary actions">
          <button class="primary" aria-label="Launch workspace">Create first project</button>
          <button class="tiny" aria-label="Open compact help">?</button>
          <div class="fake-action" data-ux-action="open-template-gallery">Open template gallery</div>
        </div>
        <section class="danger-zone" aria-label="Danger zone">
          <p>Project cleanup tools are available below.</p>
          <button>Delete project</button>
        </section>
      </section>
    </main>
  </body>
</html>
