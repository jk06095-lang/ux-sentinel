<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive navigation allow destination</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .panel { width: min(680px, 100%); border: 1px solid #cbd5e1; background: #ffffff; padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { color: #475569; }
    .actions { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 22px; }
    button {
      min-width: 180px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
    button[disabled] { background: #94a3b8; cursor: not-allowed; }
    .status { margin-top: 18px; font-weight: 700; color: #047857; }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-label="Interactive navigation allow destination">
      <h1>Navigation destination ready</h1>
      <p>The audit should replan on this page instead of stopping because navigation was explicitly allowed.</p>
      <div class="actions">
        <button disabled>Destination already open</button>
        <button onclick="document.getElementById('status').textContent = 'Allowed navigation confirmed';">Confirm navigated audit</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>
