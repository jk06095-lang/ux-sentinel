<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive skipped action fixture</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .panel { width: min(620px, 100%); border: 1px solid #cbd5e1; background: #ffffff; padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { color: #475569; }
    .actions { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 22px; }
    button {
      min-width: 150px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #475569; }
    #status { min-height: 24px; margin-top: 18px; font-weight: 700; color: #047857; }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-label="Interactive skipped action demo">
      <h1>Interactive safety fixture</h1>
      <p>The first safe action changes the UI so the second baseline target disappears before it can be acted on.</p>
      <div class="actions">
        <button id="first" onclick="document.getElementById('second')?.remove(); document.getElementById('status').textContent = 'Panel is open.';">Open panel</button>
        <button id="second" class="secondary" onclick="document.body.dataset.secondClicked = 'true';">Second action</button>
      </div>
      <div id="status" role="status" aria-live="polite"></div>
    </section>
  </main>
</body>
</html>
