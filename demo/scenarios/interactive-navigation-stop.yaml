id: interactive-navigation-stop
title: Interactive audit stops after unexpected navigation
persona: first-time-user
mode: visual_contract
start_path: /

goal:
  user_wants: "Inspect safe controls without leaving the audited state unexpectedly"
  primary_intent: "open_navigation_detail"

visual_contract:
  page_must_answer:
    - "What action is available?"
    - "Can the audit continue safely after acting?"
  primary_cta:
    preferred_labels:
      - "Open navigation detail"
    avoid_icon_only: true
    must_be_visible_above_fold: true
    must_look_clickable: true
  empty_state:
    if_detected_requires_primary_cta: false

interactive_exploration:
  enabled: true
  max_actions: 2
  hover_all_clickables: true
  click_all_safe_controls: true
  focus_all_keyboard_targets: true
  scroll_containers: false
  screenshot_before_after_each_action: true
  settle_ms: 100
  allow_navigation: false
  avoid_click_text:
    - "Delete"
    - "Remove"
    - "Pay"
    - "Purchase"
    - "Logout"
    - "Sign out"

fail_conditions:
  - primary_cta_missing
  - primary_cta_icon_only
  - horizontal_scroll
  - console_error
  - network_5xx
