<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Broken dashboard empty state</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 240px 1fr; }
    aside { background: #0f172a; color: #e5e7eb; padding: 24px; }
    main { padding: 32px; position: relative; }
    h1 { margin: 0; font-size: 28px; }
    .toolbar { position: absolute; top: 32px; right: 32px; }
    .icon-button {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #475569;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
    .empty {
      margin-top: 120px;
      min-height: 300px;
      border: 1px dashed #cbd5e1;
      display: grid;
      place-items: center;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <strong>Acme Studio</strong>
      <p>Workspace</p>
    </aside>
    <main>
      <h1>Projects</h1>
      <div class="toolbar">
        <button class="icon-button" aria-label="Create first project">+</button>
      </div>
      <section class="empty" aria-label="Project empty state">
        <p>No projects yet</p>
      </section>
    </main>
  </div>
</body>
</html>
