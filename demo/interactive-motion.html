<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive motion audit fixture</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    main { min-height: 100vh; padding: 48px; }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { margin: 0 0 28px; max-width: 620px; color: #475569; }
    .stage {
      position: relative;
      width: min(760px, calc(100vw - 96px));
      min-height: 360px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
    }
    .motion-primary {
      position: absolute;
      left: 40px;
      top: 48px;
      width: 190px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      transition-property: left, opacity;
      transition-duration: 520ms, 520ms;
      transition-timing-function: cubic-bezier(.2, .9, .2, 1), ease-in-out;
    }
    .secondary-motion {
      position: absolute;
      left: 280px;
      top: 54px;
      width: 180px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #dbeafe;
      color: #1e3a8a;
      transition-property: opacity;
      transition-duration: 120ms;
      transition-timing-function: linear;
    }
    .paint-motion {
      position: absolute;
      left: 40px;
      top: 140px;
      width: 280px;
      padding: 18px;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      background: #fffbeb;
      transition-property: box-shadow;
      transition-duration: 360ms;
      transition-timing-function: ease-out;
    }
    .status {
      position: absolute;
      left: 40px;
      top: 260px;
      min-height: 24px;
      color: #166534;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Motion review</h1>
    <p>This fixture intentionally keeps task-critical motion active under reduced motion so the demo gate can prove motion findings are evidence-backed.</p>
    <section class="stage" aria-label="Motion audit test surface">
      <button class="motion-primary" type="button">Start motion review</button>
      <div class="secondary-motion">Secondary panel</div>
      <div class="paint-motion">Animated paint-heavy panel</div>
      <div class="status" role="status" aria-live="polite"></div>
    </section>
  </main>
  <script>
    const button = document.querySelector(".motion-primary");
    const status = document.querySelector(".status");
    button.addEventListener("click", () => {
      status.textContent = "Motion review started";
    });
  </script>
</body>
</html>
