<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UX Sentinel High-Priority Fixed Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #16201d;
        background: #eef4f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        min-height: 100vh;
        padding: 48px;
        background:
          linear-gradient(90deg, rgba(22, 32, 29, 0.06) 1px, transparent 1px),
          linear-gradient(180deg, rgba(22, 32, 29, 0.06) 1px, transparent 1px),
          #eef4f2;
        background-size: 40px 40px;
      }

      .workspace {
        max-width: 920px;
        display: grid;
        gap: 22px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.3;
      }

      p {
        max-width: 680px;
        margin: 0;
        color: #52625c;
        font-size: 16px;
        line-height: 1.55;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 20px;
        padding-top: 12px;
      }

      button,
      a {
        min-height: 44px;
        border-radius: 8px;
        padding: 0 18px;
        font: inherit;
        font-weight: 700;
      }

      .primary {
        min-width: 204px;
        border: 0;
        background: #17594a;
        color: #fff;
        cursor: pointer;
      }

      .secondary {
        display: inline-flex;
        align-items: center;
        border: 1px solid #476760;
        background: #fff;
        color: #17594a;
        text-decoration: none;
        cursor: pointer;
      }

      .danger-zone {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .danger-zone button {
        width: max-content;
        border: 1px solid #9f1d2f;
        background: #fff;
        color: #9f1d2f;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="workspace" aria-label="Project setup workspace">
        <h1>Project setup</h1>
        <p>
          Create the first project, review optional templates, and keep destructive controls
          paired with a visible confirmation and recovery cue.
        </p>
        <div class="toolbar" aria-label="Primary actions">
          <button class="primary" aria-label="Create first project">Create first project</button>
          <a class="secondary" href="#templates">Open template gallery</a>
        </div>
        <section class="danger-zone" aria-label="Danger zone">
          <p>Confirm before deleting. Undo is available after the action.</p>
          <button>Delete project</button>
        </section>
      </section>
    </main>
  </body>
</html>
