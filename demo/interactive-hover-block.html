<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive hover block fixture</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; min-height: 100vh; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .panel { position: relative; width: min(680px, 100%); min-height: 260px; border: 1px solid #cbd5e1; background: #ffffff; padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { color: #475569; max-width: 52ch; }
    button {
      position: absolute;
      left: 120px;
      top: 150px;
      min-width: 180px;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
    .hover-panel {
      position: absolute;
      left: 106px;
      top: 136px;
      width: 246px;
      min-height: 104px;
      z-index: 10;
      border: 1px solid #b45309;
      background: #fffbeb;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
      padding: 14px;
    }
    .hover-panel[hidden] { display: none; }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-label="Interactive hover blocker demo">
      <h1>Hover blocker fixture</h1>
      <p>The primary action reveals hover content directly over itself. The runner should record pointer drift and skip the click.</p>
      <button
        onmouseenter="document.getElementById('hover-panel').hidden = false"
        onclick="document.body.dataset.clicked = 'true';"
      >Open hover panel</button>
      <div id="hover-panel" class="hover-panel" hidden>
        <strong>Hover panel</strong>
        <p>This panel overlaps the trigger and intercepts the final pointer hit-test.</p>
      </div>
    </section>
  </main>
</body>
</html>
