<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fixed dashboard empty state</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 240px 1fr; }
    aside { background: #0f172a; color: #e5e7eb; padding: 24px; }
    main { padding: 32px; }
    h1 { margin: 0; font-size: 28px; }
    .empty {
      margin-top: 96px;
      min-height: 320px;
      border: 1px dashed #cbd5e1;
      display: grid;
      place-items: center;
      text-align: center;
      background: #ffffff;
    }
    .empty h2 { margin: 0 0 10px; font-size: 24px; }
    .empty p { margin: 0 0 22px; color: #475569; }
    .primary {
      min-width: 180px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <strong>Acme Studio</strong>
      <p>Workspace</p>
    </aside>
    <main>
      <h1>Projects</h1>
      <section class="empty" aria-label="Project empty state">
        <div>
          <h2>No projects yet</h2>
          <p>Create your first project to start organizing work.</p>
          <button class="primary">Create first project</button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
