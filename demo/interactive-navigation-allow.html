<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive navigation allow fixture</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #111827; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .panel { width: min(680px, 100%); border: 1px solid #cbd5e1; background: #ffffff; padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { color: #475569; }
    button {
      min-width: 180px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-label="Interactive navigation allow demo">
      <h1>Navigation allow fixture</h1>
      <p>This scenario explicitly allows navigation, so the audit may continue after the URL changes.</p>
      <button onclick="window.location.href = '/interactive-navigation-allow-next';">Open navigation detail</button>
    </section>
  </main>
</body>
</html>
